[project]
enable_telemetry = false
session_timeout = 3600
cache = false
allow_origins = ["*"]

[features]
unsafe_allow_html = false
latex = false
auto_tag_thread = true

[features.spontaneous_file_upload]
    enabled = true
    accept = ["application/pdf", "text/plain", ".docx", ".md"]
    max_size_mb = 50
    max_files = 5

[UI]
name = "Cyber-RAG 🛡️"
show_readme_as_default = true
default_collapse_content = true
default_expand_messages = false

[UI.theme]
    default = "dark"
    layout = "wide"

[UI.theme.dark]
    background = "#0d1117"
    paper = "#161b22"

    [UI.theme.dark.primary]
        main = "#4facfe"
        dark = "#00f2fe"
        light = "#4facfe"

[meta]
generated_by = "1.3.0"
